<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <nav>
            <a href="connexion.html" class="active">Se connecter</a>
            <a href="inscription.html">S'inscrire</a>
        </nav>

        <h2>Connexion</h2>
        
        <form>
            <div id="content-area">
                <input type="email" placeholder="Email" required style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="password" placeholder="Mot de passe" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            
            <button type="submit" style="background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                Se connecter
            </button>
        </form>
    </div>

</body>
